<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <meta charset="UTF-8">
    <title>キャラクターレイアウト</title>
    <link rel="stylesheet" href="story.css">
    <link rel="stylesheet" href="css/characterInfo.css">
    <link rel="stylesheet" href="css/tabContainer.css">
    <link rel="stylesheet" href="css/skillContainer.css">
    <style>
        /* ロード画面（iframe）を全画面表示 */
        #load-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- ロード画面として表示するiframe -->
    <iframe id="load-screen" src="load.html"></iframe>

    <!-- メインコンテンツ -->
    <div id="main-content" class="container">
        <div id="modal" class="modal" onclick="closeModalOnOutsideClick(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button id="modal-cancel-btn" class="cancel-btn" ></button>
                <!-- <button id="modal-cancel-btn" class="cancel-btn" onclick="closeModal()">×</button> -->
                <p id="modal-message" class="modal-message"></p>
                
                <div class="select-button-container">
                    <select id="slot-select">
                        <!-- スロットオプションが動的に追加されます -->
                    </select>
                    <button id="modal-set-btn" class="set-btn">セット</button>
                </div>
            </div>
        </div>
        <div id="top-left"></div>
        <div id="top-right"></div>
    </div>
    <div id="bottom"></div>
    <!-- メインスクリプト -->
    <style>
        /* モーダル全体の背景 */
        .modal {
            align-items: center;
            justify-content: center;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }
    
        /* モーダルコンテンツ */
        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 55%;
            /* height: 25%; */
            margin: 65% auto;
            font-size: 1.5em;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            text-align: center;
        }
    
        /* モーダルのメッセージ */
        .modal-message {
            margin: 20px 0;
            font-size: 1.2em;
        }
    
        /* キャンセルボタン（右上） */
        .cancel-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            color: #888;
        }
    
        .cancel-btn:hover {
            color: #555;
        }
    
        /* セレクトとボタンの横並び用コンテナ */
        .select-button-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
    
        /* セレクトボックス */
        #slot-select {
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    
        /* セットボタン */
        .set-btn {
            padding: 8px 16px;
            font-size: 1em;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    
        .set-btn:hover {
            background-color: #45a049;
        }
    
    </style>

    <script>
        // 複数のキャラクター情報を取得 (例として配列形式で保存されたデータを想定)
        let characters = JSON.parse(sessionStorage.getItem('selectedCharacters')) || [];
        const selectedCharacter = JSON.parse(sessionStorage.getItem('selectedCharacter'));
        // let startCharacter = selectedCharacter[0]
        let statusCharacter = selectedCharacter[0]

        // statusCharacter['Lv'] = parseInt(statusCharacter['Lv']) * 10
        
        // セクションを非同期で読み込む関数
        async function loadSection(sectionId, htmlPath, jsPath) {
            // HTMLの読み込み
            const response = await fetch(htmlPath);
            if (!response.ok) throw new Error(`Failed to load ${htmlPath}`);
            
            const html = await response.text();
            document.getElementById(sectionId).innerHTML = html;

            // JSの読み込み
            if (jsPath) {
                const script = document.createElement('script');
                script.src = jsPath;
                document.head.appendChild(script);
                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = reject;
                });
            }
        }

        // メイン処理：各セクションを順次読み込む
        async function loadAllSections() {
            try {
                // 'bottom'セクションを読み込み
                await loadSection('bottom', 'sections/skill-container.html', 'js/skillContainer.js');
                console.log('bottomセクションの読み込みが完了しました');

            } catch (error) {
                console.error('セクション読み込みエラー:', error);
            }
        }

        // ページ読み込み時に各セクションの読み込みを開始
        loadAllSections();

        // ページ全体でスクロールを無効化
        document.body.style.overflow = 'hidden';

        // スクロールを許可するテーブルの要素を取得
        const scrollableTable = document.getElementById('bottom');

        // マウスがテーブル内に入ったらスクロールを有効化
        // scrollableTable.addEventListener('mouseenter', () => {
        //     document.body.style.overflow = 'auto';
        // });

        // テーブルからマウスが離れたらスクロールを再度無効化
        scrollableTable.addEventListener('mouseleave', () => {
            document.body.style.overflow = 'hidden';
        });

        // ページの再読み込みや離脱時に確認ダイアログを表示する
        window.addEventListener('beforeunload', function (event) {
            // カスタムメッセージは古いブラウザでのみサポートされています
            event.preventDefault();
            event.returnValue = ''; // ダイアログ表示のためのプロパティ設定

            // 最新のブラウザでは、returnValueに何を設定しても標準のダイアログが表示されます
            // カスタムメッセージはサポートされていないため '' のみでOKです
        });

    </script>
    <!-- 確認モーダルを読み込むコンテナ -->
    <!-- モーダル HTML -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>確認</h2>
            <p id="confirm-modal-message"></p>
            <div class="modal-buttons">
                <button id="confirm-modal-yes">はい</button>
                <button id="confirm-modal-no">いいえ</button>
            </div>
        </div>
    </div>
<script>
    // モーダルを開く関数
    function openConfirmModal(message, callback) {
        document.getElementById('confirm-modal-message').textContent = message;
        document.getElementById('confirm-modal').style.display = 'flex';

        // 「はい」ボタンのイベントを設定
        document.getElementById('confirm-modal-yes').onclick = function () {
            closeConfirmModal();
            callback(true); // 「はい」を押したときに true を返す
        };

        // 「いいえ」ボタンのイベントを設定
        document.getElementById('confirm-modal-no').onclick = function () {
            closeConfirmModal();
            callback(false); // 「いいえ」を押したときに false を返す
        };
    }

    // モーダルを閉じる関数
    function closeConfirmModal() {
        document.getElementById('confirm-modal').style.display = 'none';
    }

</script>
<div class="modal-overlay" style="display: none;" onclick="closeDiceModal()"></div> <!-- 背景オーバーレイ -->
<div id="dice-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>ダイス設定</h2>
        <label for="dice-modal-count">ダイス数:</label>
        <input type="number" id="dice-modal-count" min="1" value="1">

        <label for="dice-modal-value">ダイス値:</label>
        <input type="number" id="dice-modal-value" min="1" value="100">

        <button id="save-dice-settings" onclick="syncDiceSettingsFromModal()">保存</button>
        <button onclick="closeDiceModal()">キャンセル</button>
    </div>
</div>
<script>

    
</script>
</body>
</html>
