<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>プロフィール編集 - TRPG</title>
    <link rel="stylesheet" href="character-profile.css">
</head>
<body>
    <div id="app-scale-root">
        <div id="app-frame">
            <main class="profile-page">
                <section class="profile-card">
                    <header class="profile-header">
                        <h1>プロフィール編集</h1>
                        <p id="profile-character-name">キャラクター未選択</p>
                    </header>

                    <form id="profile-form" class="profile-form">
                        <label for="profile-text">プロフィール</label>
                        <textarea id="profile-text" rows="24" placeholder="プロフィールを入力"></textarea>
                        <p id="profile-error" class="profile-error" aria-live="polite"></p>
                        <div class="profile-actions">
                            <button id="profile-save-button" type="submit">保存</button>
                            <button id="profile-cancel-button" type="button">戻る</button>
                        </div>
                    </form>
                </section>
            </main>
        </div>
    </div>
    <script src="character-profile.js"></script>
</body>
</html>
